spring.application.name=idorendmaker-backend

# Default to development profile for local development
# Override with -Dspring.profiles.active=prod for production
spring.profiles.active=dev
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.aot.enabled=true
spring.aot.repositories.enabled=true
spring.banner.location=classpath:banner.txt

# Database Configuration
# Database URL is configured programmatically in DataSourceConfig.java
# to match the desktop app's database location logic

# JSON Serialization Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
spring.jackson.deserialization.read-date-timestamps-as-nanoseconds=false

# Logging configuration - Enhanced for GraalVM UPDATE debugging
logging.level.hu.szabolcst.idorendmaker=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=TRACE
logging.level.org.springframework.jdbc.datasource=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.sqlite=DEBUG

# SQL statement logging
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE

# Database Migration Configuration
app.migration.enabled=true
app.migration.locations=classpath:db/migrations
