# Development Profile Configuration
# This profile is used when running the backend in development mode
# It should share the same database as the desktop Electron app
# 
# To activate this profile, use: -Dspring.profiles.active=dev

# Development-specific database configuration
# Database path will be resolved to ../../idorendmaker-desktop/idorendmaker.db
# This accounts for running from target/ directory: target -> backend -> project root -> desktop
app.database.mode=development
app.database.development.relative-path=../../idorendmaker-desktop/idorendmaker.db

# Enhanced logging for development
logging.level.hu.szabolcst.idorendmaker=DEBUG
logging.level.org.springframework.jdbc=DEBUG

